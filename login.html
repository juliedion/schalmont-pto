<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Schalmont PTO</title>
  <meta name="description" content="Sign in to access the Schalmont PTO parent directory.">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="images/favicon.svg">
  <style>
    .login-page {
      min-height: 100vh;
      background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .login-card {
      background: var(--white);
      border-radius: var(--radius-xl);
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      width: 100%;
      max-width: 460px;
      overflow: hidden;
    }
    .login-header {
      background: var(--primary-dark);
      padding: 32px 32px 24px;
      text-align: center;
    }
    .login-header img { height: 64px; margin: 0 auto 16px; }
    .login-header h1 {
      color: var(--white);
      font-size: 20px;
      margin-bottom: 4px;
    }
    .login-header p {
      color: rgba(255,255,255,0.7);
      font-size: 14px;
    }
    .login-body { padding: 28px 32px 32px; }
    .login-tabs {
      display: flex;
      background: var(--light-bg);
      border-radius: var(--radius);
      padding: 4px;
      margin-bottom: 24px;
      gap: 4px;
    }
    .login-tab-btn {
      flex: 1;
      padding: 9px 12px;
      border: none;
      background: none;
      border-radius: 6px;
      font-family: 'Urbanist', sans-serif;
      font-weight: 700;
      font-size: 14px;
      color: var(--text-light);
      cursor: pointer;
      transition: all var(--transition);
    }
    .login-tab-btn.active {
      background: var(--white);
      color: var(--primary);
      box-shadow: var(--shadow-sm);
    }
    .login-footer {
      padding: 16px 32px;
      border-top: 1px solid var(--border);
      text-align: center;
      font-size: 13px;
      color: var(--text-light);
      background: var(--light-bg);
    }
    .login-footer a { color: var(--primary); font-weight: 600; }
    @media (max-width: 480px) {
      .login-body { padding: 20px; }
      .login-header { padding: 24px 20px 20px; }
      .login-footer { padding: 16px 20px; }
    }
  </style>
</head>
<body>

  <div class="login-page">
    <div class="login-card">

      <!-- HEADER -->
      <div class="login-header">
        <img src="images/logo.png" alt="Schalmont Central PTO">
        <h1>Parent Directory Access</h1>
        <p>Sign in to connect with other Schalmont families</p>
      </div>

      <!-- BODY -->
      <div class="login-body">

        <!-- Tab switcher -->
        <div class="login-tabs">
          <button class="login-tab-btn active tab-btn" data-tab="tab-signin">Sign In</button>
          <button class="login-tab-btn tab-btn" data-tab="tab-signup">Create Account</button>
        </div>

        <!-- SIGN IN -->
        <div class="tab-panel active" id="tab-signin">
          <div id="login-alert"></div>
          <form id="login-form">
            <div class="form-group">
              <label for="login-email">Email Address</label>
              <input type="email" id="login-email" name="email" required placeholder="your@email.com" autocomplete="email">
            </div>
            <div class="form-group">
              <label for="login-password">Password</label>
              <input type="password" id="login-password" name="password" required placeholder="••••••••" autocomplete="current-password">
            </div>
            <div style="text-align:right;margin-top:-10px;margin-bottom:18px">
              <a href="#" id="forgot-link" style="font-size:13px;color:var(--text-light)">Forgot password?</a>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;font-size:15px;padding:13px" data-label="Sign In">Sign In</button>
          </form>
          <p style="text-align:center;margin-top:16px;font-size:13px;color:var(--text-light)">
            Don't have an account? <a href="#" onclick="document.querySelector('[data-tab=tab-signup]').click();return false">Create one →</a>
          </p>
        </div>

        <!-- SIGN UP -->
        <div class="tab-panel" id="tab-signup">
          <div id="signup-alert"></div>
          <form id="signup-form">
            <div class="form-row">
              <div class="form-group">
                <label for="su-fname">First Name</label>
                <input type="text" id="su-fname" name="firstName" required placeholder="Jane" autocomplete="given-name">
              </div>
              <div class="form-group">
                <label for="su-lname">Last Name</label>
                <input type="text" id="su-lname" name="lastName" required placeholder="Smith" autocomplete="family-name">
              </div>
            </div>
            <div class="form-group">
              <label for="su-email">Email Address</label>
              <input type="email" id="su-email" name="email" required placeholder="your@email.com" autocomplete="email">
            </div>
            <div class="form-group">
              <label for="su-password">Password</label>
              <input type="password" id="su-password" name="password" required placeholder="At least 6 characters" autocomplete="new-password">
            </div>
            <div class="form-group">
              <label for="su-confirm">Confirm Password</label>
              <input type="password" id="su-confirm" name="confirm" required placeholder="Repeat your password" autocomplete="new-password">
            </div>
            <div class="form-group">
              <label class="form-check">
                <input type="checkbox" required>
                <span style="font-size:13px">I am a Schalmont Central School District parent or guardian</span>
              </label>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;font-size:15px;padding:13px" data-label="Create Account">Create Account</button>
          </form>
          <p style="text-align:center;margin-top:16px;font-size:13px;color:var(--text-light)">
            Already have an account? <a href="#" onclick="document.querySelector('[data-tab=tab-signin]').click();return false">Sign in →</a>
          </p>
        </div>

      </div>

      <!-- FOOTER -->
      <div class="login-footer">
        <p>This directory is for Schalmont PTO members only.</p>
        <p style="margin-top:6px">Questions? <a href="contact.html">Contact us</a> &nbsp;·&nbsp; <a href="index.html">← Back to Home</a></p>
      </div>

    </div>
  </div>

  <!-- Firebase SDKs (compat version — no module bundler needed) -->
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
