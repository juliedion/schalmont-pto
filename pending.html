<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Submit Your Family Info — Schalmont PTO</title>
  <link rel="stylesheet" href="css/styles.css?v=5">
  <link rel="icon" href="images/favicon.svg">
  <style>
    .pending-page {
      min-height: 100vh;
      background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 40px 20px 60px;
    }
    .pending-card {
      background: var(--white);
      border-radius: var(--radius-xl);
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      width: 100%;
      max-width: 520px;
      overflow: hidden;
    }
    .pending-header {
      background: var(--primary-dark);
      padding: 32px 32px 24px;
      text-align: center;
    }
    .pending-header img { height: 64px; margin: 0 auto 16px; display: block; }
    .pending-header h1 { color: var(--white); font-size: 20px; margin-bottom: 4px; }
    .pending-header p { color: rgba(255,255,255,0.7); font-size: 14px; }
    .pending-body { padding: 28px 32px 32px; }
    .pending-footer {
      padding: 16px 32px;
      border-top: 1px solid var(--border);
      text-align: center;
      font-size: 13px;
      color: var(--text-light);
      background: var(--light-bg);
    }
    .pending-footer a { color: var(--primary); font-weight: 600; }
    #page-loading {
      position: fixed;
      inset: 0;
      background: var(--primary-dark);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 9999;
    }
    #page-loading p { color: rgba(255,255,255,0.7); font-size: 14px; }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top-color: var(--secondary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .student-row-item {
      background: var(--light-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 10px;
      position: relative;
    }
    .remove-student {
      position: absolute;
      top: 10px;
      right: 12px;
      background: none;
      border: none;
      color: var(--text-light);
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      padding: 0;
    }
    .remove-student:hover { color: #c0392b; }
    @media (max-width: 480px) {
      .pending-body { padding: 20px; }
      .pending-header { padding: 24px 20px 20px; }
      .pending-footer { padding: 16px 20px; }
    }
  </style>
</head>
<body>

  <!-- Loading overlay -->
  <div id="page-loading">
    <div class="spinner"></div>
    <p>Checking credentials…</p>
  </div>

  <div class="pending-page" id="page-content" style="display:none">
    <div class="pending-card">

      <div class="pending-header">
        <img src="images/logo.png" alt="Schalmont Central PTO">
        <h1 id="page-title">Submit Your Family Info</h1>
        <p id="page-subtitle">A PTO admin will review your information before approving access</p>
      </div>

      <div class="pending-body" id="page-body">
        <!-- content injected by JS based on state -->
      </div>

      <div class="pending-footer">
        <p>Questions? <a href="contact.html">Contact us</a> &nbsp;·&nbsp; <a href="index.html">← Back to Home</a></p>
      </div>

    </div>
  </div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    const db = firebase.firestore();
    let currentUser = null;

    // ── Auth gate ──────────────────────────────────────────────
    auth.onAuthStateChanged(async function(user) {
      if (!user) {
        window.location.href = 'login.html?next=pending.html';
        return;
      }

      const isAdmin = typeof adminEmails !== 'undefined' && adminEmails.includes(user.email);

      if (!user.emailVerified && !isAdmin) {
        showState('unverified');
        return;
      }

      // Check Firestore status
      try {
        const doc = await db.collection('users').doc(user.uid).get();
        if (doc.exists) {
          const status = doc.data().status || 'pending';
          if (status === 'approved') {
            window.location.href = 'directory.html';
            return;
          }
          if (status === 'rejected') {
            showState('rejected');
            return;
          }
          // status === 'pending' — already submitted, waiting for approval
          showState('waiting');
          return;
        }
      } catch(e) { /* proceed to show form */ }

      // No Firestore doc yet — show the submission form
      currentUser = user;
      showState('form');
    });

    // ── Render page states ─────────────────────────────────────
    function showState(state) {
      document.getElementById('page-loading').style.display = 'none';
      document.getElementById('page-content').style.display = 'flex';
      const body     = document.getElementById('page-body');
      const title    = document.getElementById('page-title');
      const subtitle = document.getElementById('page-subtitle');

      if (state === 'unverified') {
        title.textContent    = 'Verify Your Email';
        subtitle.textContent = 'One more step before you can continue';
        body.innerHTML = `
          <div style="text-align:center">
            <div style="font-size:52px;margin-bottom:16px">📧</div>
            <p style="font-size:15px;color:var(--text);line-height:1.7;margin-bottom:20px">Check your inbox for a verification email from us. Click the link in that email, then come back and sign in.</p>
            <p style="font-size:13px;color:var(--text-light);margin-bottom:24px">Can't find it? Check your spam folder. If you need help, <a href="contact.html" style="color:var(--primary);font-weight:600">contact us</a>.</p>
            <button onclick="signOut()" class="btn btn-sm" style="background:none;border:1px solid var(--border);color:var(--text-light);padding:9px 20px;border-radius:var(--radius);font-family:inherit;font-size:14px;font-weight:600;cursor:pointer">Sign Out</button>
          </div>`;

      } else if (state === 'waiting') {
        title.textContent    = 'Pending Approval';
        subtitle.textContent = 'Your information has been submitted';
        body.innerHTML = `
          <div style="text-align:center">
            <div style="font-size:52px;margin-bottom:16px">⏳</div>
            <p style="font-size:15px;color:var(--text);line-height:1.7;margin-bottom:20px">Your information has been submitted and is waiting for a PTO admin to review. You'll receive access once approved. This usually happens within 1–2 business days.</p>
            <p style="font-size:13px;color:var(--text-light);margin-bottom:24px">Questions? <a href="contact.html" style="color:var(--primary);font-weight:600">Contact us</a>.</p>
            <button onclick="signOut()" class="btn btn-sm" style="background:none;border:1px solid var(--border);color:var(--text-light);padding:9px 20px;border-radius:var(--radius);font-family:inherit;font-size:14px;font-weight:600;cursor:pointer">Sign Out</button>
          </div>`;

      } else if (state === 'rejected') {
        title.textContent    = 'Access Not Approved';
        subtitle.textContent = 'This account is not authorized to view the directory';
        body.innerHTML = `
          <div style="text-align:center">
            <div style="font-size:52px;margin-bottom:16px">🚫</div>
            <p style="font-size:15px;color:var(--text);line-height:1.7;margin-bottom:24px">Your account was not approved for directory access. If you believe this is a mistake, please contact the PTO.</p>
            <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
              <a href="contact.html" class="btn btn-primary" style="padding:9px 20px;font-size:14px">Contact Us</a>
              <button onclick="signOut()" class="btn btn-sm" style="background:none;border:1px solid var(--border);color:var(--text-light);padding:9px 20px;border-radius:var(--radius);font-family:inherit;font-size:14px;font-weight:600;cursor:pointer">Sign Out</button>
            </div>
          </div>`;

      } else if (state === 'form') {
        title.textContent    = 'Submit Your Family Info';
        subtitle.textContent = 'A PTO admin will review before approving your access';
        body.innerHTML = `
          <div style="background:#fffbea;border:1px solid #f0d060;border-radius:var(--radius);padding:14px 16px;margin-bottom:20px;font-size:13px;color:#7a5c00;line-height:1.55">
            Before your account can be approved, please tell us a little about your family. A PTO admin will review this information before granting you access to the directory.
          </div>
          <div id="submit-alert"></div>
          <form id="submit-form">
            <div class="form-row">
              <div class="form-group">
                <label for="p-fname">First Name *</label>
                <input type="text" id="p-fname" required placeholder="Jane">
              </div>
              <div class="form-group">
                <label for="p-lname">Last Name *</label>
                <input type="text" id="p-lname" required placeholder="Smith">
              </div>
            </div>
            <div class="form-group">
              <label for="p-email">Contact Email *</label>
              <input type="email" id="p-email" required placeholder="jane.smith@email.com">
            </div>
            <div class="form-group">
              <label for="p-phone">Phone Number <span style="font-weight:400;color:var(--text-light)">(optional)</span></label>
              <input type="tel" id="p-phone" placeholder="(518) 555-0000">
            </div>
            <div class="form-group">
              <label>Children / Students *</label>
              <p style="font-size:12px;color:var(--text-light);margin-bottom:8px">Add at least one child so the admin can verify your connection to the district.</p>
              <div id="student-rows"></div>
              <button type="button" id="add-student-btn" class="btn btn-sm btn-blue" style="margin-top:6px;font-size:13px">+ Add Another Student</button>
            </div>
            <div class="form-group">
              <label class="form-check">
                <input type="checkbox" id="p-agree" required>
                <span style="font-size:13px">I am a Schalmont Central School District parent or guardian</span>
              </label>
            </div>
            <button type="submit" id="submit-btn" class="btn btn-primary" style="width:100%;justify-content:center" data-label="Submit for Review">Submit for Review</button>
          </form>`;

        // Pre-fill contact email from auth account
        if (currentUser) document.getElementById('p-email').value = currentUser.email;

        // Initialize student rows
        addStudentRow();
        document.getElementById('add-student-btn').addEventListener('click', addStudentRow);
        document.getElementById('submit-form').addEventListener('submit', handleSubmit);
      }
    }

    // ── Student rows ──────────────────────────────────────────
    let studentCount = 0;
    function addStudentRow() {
      studentCount++;
      const id  = studentCount;
      const row = document.createElement('div');
      row.className  = 'student-row-item';
      row.dataset.id = id;
      row.innerHTML = `
        ${id > 1 ? `<button type="button" class="remove-student" onclick="this.closest('.student-row-item').remove()" title="Remove">✕</button>` : ''}
        <div class="form-row" style="margin-bottom:8px">
          <div class="form-group" style="margin-bottom:0">
            <label style="font-size:13px">Child's Name *</label>
            <input type="text" class="s-name" required placeholder="Alex Smith">
          </div>
          <div class="form-group" style="margin-bottom:0">
            <label style="font-size:13px">Grade *</label>
            <select class="s-grade" required style="width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius);font-family:inherit;font-size:14px;background:var(--white);color:var(--text)">
              <option value="">Select…</option>
              <option>Pre-K</option>
              <option>K</option>
              <option>1</option><option>2</option><option>3</option>
              <option>4</option><option>5</option><option>6</option>
              <option>7</option><option>8</option><option>9</option>
              <option>10</option><option>11</option><option>12</option>
            </select>
          </div>
        </div>
        <div class="form-group" style="margin-bottom:0">
          <label style="font-size:13px">School *</label>
          <select class="s-school" required style="width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius);font-family:inherit;font-size:14px;background:var(--white);color:var(--text)">
            <option value="">Select…</option>
            <option>Woestina Pre-K</option>
            <option>Jefferson Elementary</option>
            <option>Middle School</option>
            <option>High School</option>
          </select>
        </div>`;
      document.getElementById('student-rows').appendChild(row);
    }

    // ── Form submission ────────────────────────────────────────
    async function handleSubmit(e) {
      e.preventDefault();
      if (!currentUser) return;

      const btn       = document.getElementById('submit-btn');
      btn.disabled    = true;
      btn.textContent = 'Submitting…';

      const firstName = document.getElementById('p-fname').value.trim();
      const lastName  = document.getElementById('p-lname').value.trim();
      const email     = document.getElementById('p-email').value.trim();
      const phone     = document.getElementById('p-phone').value.trim();

      // Collect students
      const students = [];
      document.querySelectorAll('#student-rows .student-row-item').forEach(function(row) {
        const name   = row.querySelector('.s-name').value.trim();
        const grade  = row.querySelector('.s-grade').value;
        const school = row.querySelector('.s-school').value;
        if (name && grade && school) students.push({ name, grade, school });
      });

      if (students.length === 0) {
        document.getElementById('submit-alert').innerHTML =
          '<div class="alert alert-error"><span>✕</span><span>Please add at least one child.</span></div>';
        btn.disabled    = false;
        btn.textContent = 'Submit for Review';
        return;
      }

      // Capture IP for admin review
      let ipAddress = '';
      try {
        const res = await fetch('https://api.ipify.org?format=json');
        ipAddress = (await res.json()).ip || '';
      } catch(e) {}

      try {
        const uid = currentUser.uid;

        // Write users record — this is what makes them appear in the admin panel
        await db.collection('users').doc(uid).set({
          email:       currentUser.email,
          displayName: firstName + ' ' + lastName,
          status:      'pending',
          ipAddress:   ipAddress,
          createdAt:   firebase.firestore.FieldValue.serverTimestamp()
        });

        // Write directory listing — pre-populates their entry for the admin to review
        await db.collection('directory').doc(uid).set({
          firstName,
          lastName,
          email,
          phone,
          students,
          showEmail: true,
          showPhone: false,
          uid,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        showState('waiting');
      } catch(err) {
        document.getElementById('submit-alert').innerHTML =
          '<div class="alert alert-error"><span>✕</span><span>Something went wrong: ' + (err.message || 'Please try again.') + '</span></div>';
        btn.disabled    = false;
        btn.textContent = 'Submit for Review';
      }
    }
  </script>
</body>
</html>
